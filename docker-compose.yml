services:
    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-ember}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ember}
            POSTGRES_DB: ${POSTGRES_DB:-ember}
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ember}']
            interval: 5s
            timeout: 5s
            retries: 5

    pgadmin:
        image: dpage/pgadmin4
        restart: unless-stopped
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@ember.dev
            PGADMIN_DEFAULT_PASSWORD: admin
        ports:
            - '5050:80'
        depends_on:
            - postgres

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 5s
            retries: 5

    nginx:
        image: nginx:alpine
        restart: unless-stopped
        ports:
            - '80:80'
        volumes:
            - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            - postgres
            - redis

volumes:
    postgres_data:
    redis_data:
